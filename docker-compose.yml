services:
  iperf3-webui:
    build:
      context: .
      dockerfile: Dockerfile
    #image: ghcr.io/r0gger/iperf3-webui
    container_name: iperf3-webui
    restart: unless-stopped
    ports:
      - 5000:5000
    volumes:
      - ./env.yaml:/app/env.yaml
    environment:
      - FLASK_DEBUG=false
